<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OutreachAI - Autonomous Outreach Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0ede6;
      min-height: 100vh;
      color: #0d0d0d;
      display: flex;
    }
    .sidebar {
      width: 290px;
      background: #0d0d0d;
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 11px; }
    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #ff5c00, #ff9500);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-icon svg { width: 20px; height: 20px; fill: #fff; }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 20px; font-weight: 800;
      color: #fff; letter-spacing: -0.5px;
    }
    .brand-tag {
      font-size: 10px; font-weight: 600;
      color: #ff7a2f; letter-spacing: 1px; text-transform: uppercase;
    }
    .divider { height: 1px; background: rgba(255,255,255,0.07); }
    .sec-hd {
      font-size: 9px; font-weight: 600; color: #444;
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px;
    }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block; font-size: 10px; font-weight: 600;
      color: #555; text-transform: uppercase;
      letter-spacing: 0.6px; margin-bottom: 5px;
    }
